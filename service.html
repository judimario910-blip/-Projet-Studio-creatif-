  <!DOCTYPE html>
      <html lang="fr">
     <head>
    <meta charset="UTF-8">
    <meta       name="viewport"content="width=device-width, initial-scale=1.0">
    <title>Services Studio</title>
    <link rel="stylesheet" href="style.css">
    <style>
      *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
    }

    body{
  background:linear-gradient(90deg,                 white, blue);
    color:white;
    }

    .services{
    padding:60px 8%;
    text-align:center;
}

    .title{
    font-size:40px;
    margin-bottom:50px;
}

    .services-container{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:30px;
    }

    .service-card{
    background:#1e293b;
    padding:30px;
    border-radius:15px;
    transition:0.4s;
    opacity:0;
    transform:translateY(40px);
    animation:fadeUp 1s forwards;
    }


    .service-card:nth-child(2){animation-delay:0.3s;}
    .service-card:nth-child(3){animation-delay:0.4s;}
    .service-card:nth-child(4)                 {animation-delay:0.6s;}

    .service-card:hover{
transform:translateY(-10px) scale(1.05);
background:#334155;
}

    .icon{
    font-size:40px;
    margin-bottom:15px;
    }


    @keyframes fadeUp{
    to{
    opacity:1;
    transform:translateY(0);
    }
}


    @media(max-width:992px){

.services-container{
grid-template-columns:repeat(2,1fr);
    }

    .title{
    font-size:32px;
    }

 }

    @media(max-width:600px){

    .services-container{
    grid-template-columns:1fr;
    }
    .title{
    font-size:26px;
    }

    .service-card{
    padding:20px;
    }

    .icon{
    font-size:30px;
    }

 }
 
 button{
     padding-right:3px;
     content:30px;
    margin:5px;
    margin-top:50px;
 }


    </style>
</head>

    <body>
        <header>
            <div class="nav-bar">
                
            </div>
        </header>

    <section class="services">

    <h1 class="title">Nos Services</h1>
    <a href="index.html">⬅️</a>

      <div class="services-container">

    <div class="service-card">
    <div class="icon">🎨</div>
    <h3>Design Graphique</h3>
    <p>Création de logos et identités visuelles modernes.</p>
    </div>

    <div class="service-card">
    <div class="icon">💻</div>
    <h3>Développement Web</h3>
    <p>Création de sites web rapides et responsive.</p>
    </div>

    <div class="service-card">
    <div class="icon">📸</div>
        <h3>Photographie</h3>
    <p>Photos professionnelles pour vos projets.</p>
    </div>

    <div class="service-card">
       <div class="icon">🎬</div>
    <h3>Montage Vidéo</h3>
  <p>Production et montage vidéo créatif.</p>
    </div>

    </div>

    </section>

    </body>
   </html>
