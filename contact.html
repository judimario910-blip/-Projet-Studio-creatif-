 <!DOCTYPE html>
    <html lang="fr">
   <head>
        <meta charset="UTF-8">
      <meta name="viewport"    content="width=device-width, initial-scale=1.0">
    <title>Contact & Réservation</title>
    </head>
        <style>
    *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
    }

    body{
    background:linear-gradient(90deg,#1e293b,#1e293b);
    color:white;
    border:2px,solid,#333;
    }

    .contact{
    padding:60px 10%;
    text-align:center;
    }

    .contact h1{
    font-size:40px;
    margin-bottom:10px;
    }

    .contact p{
    margin-bottom:40px;
    color:#ccc;
    }

    .container{
    display:flex;
    gap:40px;
    justify-content:center;
    align-items:center;
    flex-wrap:wrap;
    }

    .info{
    flex:1;
    min-width:250px;
    text-align:left;
    animation:fadeLeft 1s ease;
    }

    .info h2{
    margin-bottom:20px;
    }

    .form{
    flex:1;
    min-width:250px;
    display:flex;
    flex-direction:column;
    gap:15px;
    animation:fadeRight 1s ease;
    }

    .form input,
    .form select,
    .form textarea{
    padding:12px;
    border:none;
    border-radius:5px;
    outline:none;
    }

    .form textarea{
    height:120px;
    resize:none;
    }

    .form button{
    padding:12px;
    border:none;
    background:#ff4b2b;
    color:white;
    font-size:16px;
    cursor:pointer;
    border-radius:5px;
    transition:0.3s;
    }

    .form button:hover{
    background:red;
    transform:scale(1.05);
    }


    @keyframes fadeLeft{
    from{
    opacity:0;
    transform:translateX(-50px);
    }
    to{
    opacity:1;
    transform:translateX(0);
    }
}

    @keyframes fadeRight{
    from{
    opacity:0;
    transform:translateX(50px);
    }
    to{
    opacity:1;
    transform:translateX(0);
    }
    }


    @media(max-width:768px){

    .container{
    flex-direction:column;
    }

    .contact h1{
    font-size:30px;
    }

 }
    </style>

    <body>
<a href="index.html">⬅️</a>
        <section class="contact">

    <h1>Contact & Réservation</h1>
    <p>Réservez votre séance ou contactez notre studio.</p>

    <div class="container">

    <div class="info">
    <h2>Nos Informations</h2>
    <p>Email : studiocreatif@gmail.com</p>
    <p>Adresse :  Rue Antananarivo, Madagascar</p>
    </div>

        <form class="form">

    <input type="text" placeholder="Votre nom" required>

    <input type="email" placeholder="Votre email" required>

    <input type="date"  placeholder="choisir le date">

        <select>
    <option>Choisir un service</option>
    <option>Photographie</option>
    <option>Vidéo</option>
    <option>Design</option>
        </select>

    <textarea placeholder="Votre message"></textarea>

    <button type="submit">Réserver</button>

    </form>

    </div>

        </section>

    </body>
 </html>
